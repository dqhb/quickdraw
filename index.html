<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orange Swarm</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            background-color: #222;
            box-shadow: 0 0 15px #ff8c00;
        }
        #ui-layer {
            position: absolute;
            background: rgba(0, 0, 0, 0.85);
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        h1 { color: #ff8c00; font-size: 48px; margin-bottom: 10px; }
        input {
            padding: 12px;
            font-size: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 2px solid #ff8c00;
            background: #333;
            color: white;
            text-align: center;
            outline: none;
        }
        button {
            padding: 12px 24px;
            font-size: 20px;
            cursor: pointer;
            background-color: #ff8c00;
            color: #111;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            transition: 0.2s;
        }
        button:hover { background-color: #ffa500; transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1>ORANGE SWARM</h1>
        <input type="text" id="nicknameInput" placeholder="Enter Nickname" maxlength="15" autofocus>
        <button id="startBtn">SURVIVE</button>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const uiLayer = document.getElementById('ui-layer');
        const nicknameInput = document.getElementById('nicknameInput');
        const startBtn = document.getElementById('startBtn');

        let isPlaying = false;
        const keys = {};
        let bullets = [];
        let enemies = [];
        let frameCount = 0;

        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            size: 15,
            speed: 4,
            color: '#00ffff',
            nickname: '',
            facingX: 1, 
            facingY: 0,
            cooldown: 0
        };

        // UI Listeners
        startBtn.addEventListener('click', startGame);
        nicknameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') startGame();
        });

        function startGame() {
            const name = nicknameInput.value.trim();
            player.nickname = name === '' ? 'Survivor' : name;
            uiLayer.style.display = 'none';
            isPlaying = true;
            bullets = [];
            enemies = [];
            gameLoop();
        }

        // Controls
        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if (e.code === 'Space') e.preventDefault(); 
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        function spawnEnemy() {
            // Spawn orange enemies at the edges
            let ex, ey;
            if (Math.random() < 0.5) {
                ex = Math.random() < 0.5 ? 0 : canvas.width;
                ey = Math.random() * canvas.height;
            } else {
                ex = Math.random() * canvas.width;
                ey = Math.random() < 0.5 ? 0 : canvas.height;
            }
            enemies.push({ x: ex, y: ey, size: 12, speed: 2 });
        }

        function update() {
            if (!isPlaying) return;
            frameCount++;

            // 1. WASD Movement & Direction
            let movedX = 0, movedY = 0;
            if (keys['w']) movedY -= 1;
            if (keys['s']) movedY += 1;
            if (keys['a']) movedX -= 1;
            if (keys['d']) movedX += 1;

            player.x += movedX * player.speed;
            player.y += movedY * player.speed;

            if (movedX !== 0 || movedY !== 0) {
                const length = Math.sqrt(movedX * movedX + movedY * movedY);
                player.facingX = movedX / length;
                player.facingY = movedY / length;
            }

            // Boundaries
            player.x = Math.max(player.size, Math.min(canvas.width - player.size, player.x));
            player.y = Math.max(player.size, Math.min(canvas.height - player.size, player.y));

            // 2. Shooting (Spacebar)
            if (player.cooldown > 0) player.cooldown--;
            if (keys[' '] && player.cooldown === 0) {
                bullets.push({
                    x: player.x,
                    y: player.y,
                    vx: player.facingX * 12,
                    vy: player.facingY * 12,
                    size: 4
                });
                player.cooldown = 10; // Fire rate
            }

            // 3. Enemy Swarm AI
            if (frameCount % 30 === 0) spawnEnemy(); // Spawn rate

            enemies.forEach(enemy => {
                const dx = player.x - enemy.x;
                const dy = player.y - enemy.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                enemy.x += (dx / dist) * enemy.speed;
                enemy.y += (dy / dist) * enemy.speed;
            });

            // 4. Lag Fixes (Collisions & Garbage Collection)
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.x += b.vx;
                b.y += b.vy;

                // Remove off-screen bullets
                if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                    bullets.splice(i, 1);
                    continue;
                }

                // Check bullet hits against Orange Swarm
                for (let j = enemies.length - 1; j >= 0; j--) {
                    let e = enemies[j];
                    const dist = Math.hypot(b.x - e.x, b.y - e.y);
                    if (dist < b.size + e.size) {
                        enemies.splice(j, 1); // Kill enemy
                        bullets.splice(i, 1); // Destroy bullet
                        break;
                    }
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!isPlaying) return;

            // Draw Bullets
            ctx.fillStyle = '#fff';
            bullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw Orange Swarm
            ctx.fillStyle = '#ff8c00';
            enemies.forEach(e => {
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw Player
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
            ctx.fill();

            // Gun Barrel Indicator
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(player.x + player.facingX * 25, player.y + player.facingY * 25);
            ctx.stroke();

            // Draw Nickname
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.font = '14px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText(player.nickname, player.x, player.y - player.size - 10);
        }

        function gameLoop() {
            update();
            draw();
            if (isPlaying) requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
