<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>miller madness</title>
    <style>
        body { margin: 0; background: #050505; color: #00ffcc; font-family: 'Courier New', monospace; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: #000; border: 4px solid #00ffcc; box-shadow: 0 0 30px #00ffcc; }
        #ui { position: absolute; top: 10px; width: 780px; display: flex; justify-content: space-between; font-size: 22px; text-shadow: 2px 2px #000; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui">
        <div>WAVE: <span id="wave">1</span></div>
        <div>SCORE: <span id="score">0</span></div>
        <div>LIVES: <span id="lives">3</span></div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800;
        canvas.height = 600;

        // Assets
        const millerImg = new Image();
        millerImg.src = 'miller.png'; 

        // Game State
        let score = 0, lives = 3, wave = 1, gameActive = true;
        let enemySpeed = 2, dogFireRate = 0.005;
        
        const player = { x: 375, y: 530, w: 60, h: 60, speed: 9 };
        const bullets = [], enemyBullets = [], dogs = [];
        const keys = {};

        function spawnWave() {
            dogs.length = 0;
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 10; c++) {
                    dogs.push({
                        x: 80 + c * 65,
                        y: 50 + r * 50,
                        w: 40, h: 30,
                        alive: true,
                        type: r === 0 ? 'alpha' : 'grunt',
                        charging: false
                    });
                }
            }
            document.getElementById('wave').innerText = wave;
        }

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        let dogDir = 1;
        let fireCD = 0;

        function update() {
            if (!gameActive) return;

            // 1. Miller Movement
            if (keys['KeyA'] && player.x > 0) player.x -= player.speed;
            if (keys['KeyD'] && player.x < canvas.width - player.w) player.x += player.speed;

            // 2. Miller Firing (Faces shooting small faces)
            if (fireCD > 0) fireCD--;
            if (keys['Space'] && fireCD === 0) {
                bullets.push({ x: player.x + 20, y: player.y, w: 20, h: 20 });
                fireCD = 12;
            }

            bullets.forEach((b, i) => {
                b.y -= 12;
                if (b.y < 0) bullets.splice(i, 1);
            });

            // 3. Dog AI & Attack Patterns
            let shiftDown = false;
            dogs.forEach(d => {
                if (!d.alive) return;

                // Horizontal Move
                if (!d.charging) {
                    d.x += dogDir * enemySpeed;
                    if (d.x > canvas.width - d.w || d.x < 0) shiftDown = true;
                } else {
                    d.y += 8; // THE ZOOMIES attack
                    if (d.y > canvas.height) d.alive = false; // Dog ran away
                }

                // Attack Logic
                const chance = Math.random();
                if (chance < dogFireRate) {
                    if (d.type === 'alpha') {
                        // Spread Shot
                        for(let i=-1; i<=1; i++) enemyBullets.push({ x: d.x+15, y: d.y+30, vx: i*2, vy: 5, t: "BARK!" });
                    } else {
                        // Standard Bark
                        enemyBullets.push({ x: d.x+15, y: d.y+30, vx: 0, vy: 5, t: "woof" });
                    }
                }

                // Rare Charge Attack
                if (chance < 0.0005) d.charging = true;

                // Collision with Miller
                if (d.x < player.x + player.w && d.x + d.w > player.x && d.y < player.y + player.h && d.y + d.h > player.y) {
                    lives = 0; gameActive = false;
                }
            });

            if (shiftDown) {
                dogDir *= -1;
                dogs.forEach(d => { if(!d.charging) d.y += 15; });
            }

            // 4. Enemy Projectile Logic
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                let eb = enemyBullets[i];
                eb.x += eb.vx;
                eb.y += eb.vy;

                if (eb.y > canvas.height) { enemyBullets.splice(i, 1); continue; }

                // Hit Miller
                if (eb.x > player.x && eb.x < player.x + player.w && eb.y > player.y && eb.y < player.y + player.h) {
                    enemyBullets.splice(i, 1);
                    lives--;
                    document.getElementById('lives').innerText = lives;
                    if (lives <= 0) gameActive = false;
                }
            }

            // 5. Collision: Miller Bullet vs Dog
            bullets.forEach((b, bi) => {
                dogs.forEach((d, di) => {
                    if (d.alive && b.x < d.x + d.w && b.x + b.w > d.x && b.y < d.y + d.h && b.y + b.h > d.y) {
                        d.alive = false;
                        bullets.splice(bi, 1);
                        score += d.type === 'alpha' ? 500 : 100;
                        document.getElementById('score').innerText = score;
                    }
                });
            });

            // 6. Next Wave Logic
            if (dogs.every(d => !d.alive)) {
                wave++;
                enemySpeed += 0.8;
                dogFireRate += 0.002;
                spawnWave();
            }
        }

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (!gameActive) {
                ctx.fillStyle = "#ff00cc";
                ctx.font = "50px Courier New";
                ctx.textAlign = "center";
                ctx.fillText("MILLER OVERWHELMED", canvas.width/2, canvas.height/2);
                return;
            }

            // Draw Player Miller
            ctx.drawImage(millerImg, player.x, player.y, player.w, player.h);

            // Draw Bullet Miller Faces
            bullets.forEach(b => ctx.drawImage(millerImg, b.x, b.y, b.w, b.h));

            // Draw Dogs
            dogs.forEach(d => {
                if (!d.alive) return;
                ctx.fillStyle = d.type === 'alpha' ? "#ff0000" : "#8B4513";
                ctx.fillRect(d.x, d.y, d.w, d.h);
                ctx.fillStyle = "white"; // Eyes
                ctx.fillRect(d.x+5, d.y+5, 5, 5); ctx.fillRect(d.x+d.w-10, d.y+5, 5, 5);
            });

            // Draw Barks
            ctx.fillStyle = "#00ffcc";
            ctx.font = "bold 14px Arial";
            enemyBullets.forEach(eb => ctx.fillText(eb.t, eb.x, eb.y));

            requestAnimationFrame(() => { update(); draw(); });
        }

        millerImg.onload = () => { spawnWave(); draw(); };
    </script>
</body>
</html>
