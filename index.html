<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>miller madness</title>
    <style>
        body { margin: 0; background: #020205; color: #00ffcc; font-family: 'Courier New', monospace; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: #000; border: 4px solid #00ffcc; box-shadow: 0 0 50px #0044ff; }
        #ui { position: absolute; top: 10px; width: 780px; display: flex; justify-content: space-between; font-size: 20px; font-weight: bold; pointer-events: none; z-index: 10; }
        #meter-container { width: 100px; height: 10px; background: #333; border: 1px solid #fff; margin-top: 5px; }
        #meter-fill { width: 0%; height: 100%; background: #00ffcc; transition: width 0.1s; }
    </style>
</head>
<body>

    <div id="ui">
        <div>wave: <span id="wave">1</span></div>
        <div>wide meter: <div id="meter-container"><div id="meter-fill"></div></div></div>
        <div>lives: <span id="lives">3</span></div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800;
        canvas.height = 600;

        const millerImg = new Image();
        millerImg.src = 'miller.png'; 

        let score = 0, lives = 3, wave = 1, gameActive = true;
        let enemySpeed = 1.5, dogFireRate = 0.007;
        let isSuper = false, superCharge = 100;
        
        const player = { x: 340, y: 520, w: 130, h: 70, speed: 8 };
        const bullets = [], enemyBullets = [], dogs = [];
        const keys = {};

        // PIXEL DOG TEXTURE GENERATOR
        function drawPixelDog(x, y, w, h, color) {
            ctx.fillStyle = color;
            // Body
            ctx.fillRect(x + w*0.2, y + h*0.3, w*0.6, h*0.5);
            // Head
            ctx.fillRect(x + w*0.5, y + h*0.1, w*0.4, h*0.4);
            // Ears
            ctx.fillStyle = "#5D2E0A";
            ctx.fillRect(x + w*0.55, y, w*0.1, h*0.2);
            ctx.fillRect(x + w*0.8, y, w*0.1, h*0.2);
            // Tail
            ctx.fillStyle = color;
            ctx.fillRect(x + w*0.1, y + h*0.2, w*0.1, h*0.2);
            // Eyes
            ctx.fillStyle = "white";
            ctx.fillRect(x + w*0.65, y + h*0.2, w*0.05, h*0.05);
            ctx.fillRect(x + w*0.8, y + h*0.2, w*0.05, h*0.05);
            // Nose
            ctx.fillStyle = "black";
            ctx.fillRect(x + w*0.85, y + h*0.3, w*0.05, h*0.05);
        }

        function spawnWave() {
            dogs.length = 0;
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 8; c++) {
                    dogs.push({
                        x: 100 + c * 85, y: 60 + r * 55,
                        w: 50, h: 40, alive: true,
                        color: r === 0 ? "#FFD700" : "#8B4513", // Golden Alphas
                        charging: false
                    });
                }
            }
            document.getElementById('wave').innerText = wave;
        }

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'ShiftLeft' && superCharge >= 100) {
                isSuper = true;
                superCharge = 0;
                player.w = 280; 
                setTimeout(() => { player.w = 130; isSuper = false; }, 800);
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        let dogDir = 1;
        let fireCD = 0;

        function update() {
            if (!gameActive) return;

            // Super Charge Logic
            if (superCharge < 100) superCharge += 0.5;
            document.getElementById('meter-fill').style.width = superCharge + "%";
            document.getElementById('meter-fill').style.background = superCharge >= 100 ? "#00ffcc" : "#ff3300";

            if (keys['KeyA'] && player.x > 0) player.x -= player.speed;
            if (keys['KeyD'] && player.x < canvas.width - player.w) player.x += player.speed;

            if (fireCD > 0) fireCD--;
            if (keys['Space'] && fireCD === 0) {
                bullets.push({ x: player.x + (player.w/2) - 30, y: player.y, w: 60, h: 35 });
                fireCD = 12;
            }

            bullets.forEach((b, i) => {
                b.y -= 15;
                if (b.y < 0) bullets.splice(i, 1);
            });

            let shiftDown = false;
            dogs.forEach(d => {
                if (!d.alive) return;
                if (!d.charging) {
                    d.x += dogDir * enemySpeed;
                    if (d.x > canvas.width - d.w || d.x < 0) shiftDown = true;
                } else {
                    d.y += 12;
                    if (d.y > canvas.height) d.alive = false;
                }

                if (Math.random() < dogFireRate) {
                    enemyBullets.push({ x: d.x + 20, y: d.y + 30, vy: 7, t: "BARK!" });
                }
                if (Math.random() < 0.0005) d.charging = true;

                if (d.x < player.x + player.w && d.x + d.w > player.x && d.y < player.y + player.h && d.y + d.h > player.y) {
                    if (isSuper) d.alive = false;
                    else { lives--; d.alive = false; if (lives <= 0) gameActive = false; }
                    document.getElementById('lives').innerText = lives;
                }
            });

            if (shiftDown) {
                dogDir *= -1;
                dogs.forEach(d => { if(!d.charging) d.y += 25; });
            }

            enemyBullets.forEach((eb, i) => {
                eb.y += eb.vy;
                if (eb.y > canvas.height) enemyBullets.splice(i, 1);
                if (!isSuper && eb.x > player.x && eb.x < player.x + player.w && eb.y > player.y && eb.y < player.y + player.h) {
                    enemyBullets.splice(i, 1);
                    lives--;
                    document.getElementById('lives').innerText = lives;
                    if (lives <= 0) gameActive = false;
                }
            });

            bullets.forEach((b, bi) => {
                dogs.forEach((d, di) => {
                    if (d.alive && b.x < d.x + d.w && b.x + b.w > d.x && b.y < d.y + d.h && b.y + b.h > d.y) {
                        d.alive = false;
                        bullets.splice(bi, 1);
                    }
                });
            });

            if (dogs.every(d => !d.alive)) { wave++; enemySpeed += 0.5; dogFireRate += 0.001; spawnWave(); }
        }

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (!gameActive) {
                ctx.fillStyle = "#00ffcc";
                ctx.font = "bold 40px Courier New";
                ctx.textAlign = "center";
                ctx.fillText("miller falls", canvas.width/2, 300);
                return;
            }

            // Player Wide Miller
            if (isSuper) {
                ctx.shadowBlur = 20;
                ctx.shadowColor = "#00ffcc";
            }
            ctx.drawImage(millerImg, player.x, player.y, player.w, player.h);
            ctx.shadowBlur = 0;

            // Wide Bullets
            bullets.forEach(b => ctx.drawImage(millerImg, b.x, b.y, b.w, b.h));

            // Textured Dogs
            dogs.forEach(d => {
                if (d.alive) drawPixelDog(d.x, d.y, d.w, d.h, d.color);
            });

            // Bark Text
            ctx.fillStyle = "white";
            ctx.font = "bold 12px Arial";
            enemyBullets.forEach(eb => ctx.fillText(eb.t, eb.x, eb.y));

            requestAnimationFrame(() => { update(); draw(); });
        }

        millerImg.onload = () => { spawnWave(); draw(); };
    </script>
</body>
</html>
