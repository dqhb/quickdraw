<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>miller madness</title>
    <style>
        body { margin: 0; background: #0a0a0a; color: #00ff00; font-family: 'Courier New', monospace; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: black; border: 3px solid #00ff00; box-shadow: 0 0 20px #00ff00; }
        #ui { position: absolute; top: 20px; width: 580px; display: flex; justify-content: space-between; font-size: 20px; font-weight: bold; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui">
        <div>SCORE: <span id="score">0</span></div>
        <div>LIVES: <span id="lives">3</span></div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 600;
        canvas.height = 700;

        // Assets
        const millerImg = new Image();
        millerImg.src = 'miller.png'; 

        let score = 0;
        let lives = 3;
        let gameActive = true;
        let enemySpeed = 1.5;

        const player = { x: 275, y: 620, w: 50, h: 50, speed: 8 };
        const keys = {};
        const bullets = [];
        const enemyBullets = [];
        const enemies = [];

        function initDogs() {
            enemies.length = 0;
            for (let row = 0; row < 4; row++) {
                for (let col = 0; col < 8; col++) {
                    enemies.push({
                        x: 60 + col * 60,
                        y: 60 + row * 50,
                        w: 40, h: 30,
                        alive: true
                    });
                }
            }
        }
        initDogs();

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        let dogDir = 1;
        let fireCooldown = 0;

        function update() {
            if (!gameActive) return;

            // Player Control
            if (keys['KeyA'] && player.x > 0) player.x -= player.speed;
            if (keys['KeyD'] && player.x < canvas.width - player.w) player.x += player.speed;

            // Firing Miller Faces
            if (fireCooldown > 0) fireCooldown--;
            if (keys['Space'] && fireCooldown === 0) {
                bullets.push({ x: player.x + 15, y: player.y, w: 25, h: 25 });
                fireCooldown = 15; 
            }

            // Miller Face Physics
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= 12;
                if (bullets[i].y < 0) bullets.splice(i, 1);
            }

            // Dog Movement
            let edgeHit = false;
            enemies.forEach(d => {
                if (!d.alive) return;
                d.x += dogDir * enemySpeed;
                if (d.x > canvas.width - d.w || d.x < 0) edgeHit = true;
                
                // Dogs shooting "WOOFS"
                if (Math.random() < 0.004) {
                    enemyBullets.push({ x: d.x + 15, y: d.y + 30, text: "WOOF" });
                }
            });

            if (edgeHit) {
                dogDir *= -1;
                enemies.forEach(d => d.y += 15);
            }

            // Bark Projectile Physics
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                let eb = enemyBullets[i];
                eb.y += 4;
                if (eb.y > canvas.height) enemyBullets.splice(i, 1);

                // Collision with Player
                if (eb.y > player.y && eb.y < player.y + player.h && 
                    eb.x > player.x && eb.x < player.x + player.w) {
                    enemyBullets.splice(i, 1);
                    lives--;
                    document.getElementById('lives').innerText = lives;
                    if (lives <= 0) gameActive = false;
                }
            }

            // Miller Face Hitting Dog
            bullets.forEach((b, bi) => {
                enemies.forEach((d, di) => {
                    if (d.alive && b.x < d.x + d.w && b.x + b.w > d.x && 
                        b.y < d.y + d.h && b.y + b.h > d.y) {
                        d.alive = false;
                        bullets.splice(bi, 1);
                        score += 150;
                        document.getElementById('score').innerText = score;
                    }
                });
            });

            if (enemies.every(d => !d.alive)) {
                enemySpeed += 0.5;
                initDogs();
            }
        }

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (!gameActive) {
                ctx.fillStyle = "#ff0000";
                ctx.font = "40px Courier New";
                ctx.textAlign = "center";
                ctx.fillText("MILLER DEFEATED", canvas.width/2, 350);
                return;
            }

            // Draw Ship
            ctx.fillStyle = "#00ff00";
            ctx.fillRect(player.x, player.y + 10, player.w, player.h - 10);
            ctx.fillRect(player.x + 20, player.y, 10, 10);

            // Draw Miller Faces
            bullets.forEach(b => {
                ctx.drawImage(millerImg, b.x, b.y, b.w, b.h);
            });

            // Draw Pixelated Dogs
            enemies.forEach(d => {
                if (!d.alive) return;
                ctx.fillStyle = "#8B4513"; // Brown Dogs
                ctx.fillRect(d.x, d.y, d.w, d.h); // Body
                ctx.fillRect(d.x - 5, d.y + 5, 5, 15); // Ear left
                ctx.fillRect(d.x + d.w, d.y + 5, 5, 15); // Ear right
                ctx.fillStyle = "black";
                ctx.fillRect(d.x + 8, d.y + 8, 4, 4); // Eye
                ctx.fillRect(d.x + 28, d.y + 8, 4, 4); // Eye
            });

            // Draw Barks
            ctx.fillStyle = "white";
            ctx.font = "bold 12px Arial";
            enemyBullets.forEach(eb => {
                ctx.fillText(eb.text, eb.x, eb.y);
            });

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        millerImg.onload = draw;
    </script>
</body>
</html>
