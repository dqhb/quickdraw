<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>quickdraw</title>
    <style>
        body {
            margin: 0;
            background-color: #2b2b36;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Start Screen */
        #ui-layer {
            position: absolute;
            background: rgba(30, 30, 40, 0.95);
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        #ui-layer input {
            padding: 12px; font-size: 18px; border-radius: 8px; border: 2px solid #00d2ff;
            background: #111; color: white; text-align: center; margin-bottom: 10px;
        }
        #ui-layer button {
            padding: 12px 24px; font-size: 20px; cursor: pointer; background-color: #00d2ff;
            color: #111; font-weight: bold; border: none; border-radius: 8px; transition: 0.2s; margin-top: 10px;
        }
        #ui-layer button:hover { background-color: #00a8cc; }

        /* Game Layout */
        #game-container {
            display: none; width: 900px; height: 600px; background-color: #1e1e24;
            border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); flex-direction: row; overflow: hidden;
        }

        /* Drawing Area */
        #draw-area {
            flex: 2; display: flex; flex-direction: column; padding: 15px; border-right: 2px solid #333;
        }
        .header-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        /* The Secret Word Censor Box */
        .secret-word-box {
            background: #111; padding: 5px 15px; border-radius: 5px; border: 1px solid #555;
            cursor: help; position: relative;
        }
        #word-display {
            background: black; color: black; transition: 0.2s; border-radius: 3px; padding: 2px 5px;
        }
        .secret-word-box:hover #word-display { background: transparent; color: #2ed573; font-weight: bold; }

        canvas { background-color: white; border-radius: 5px; cursor: crosshair; flex-grow: 1; }
        .tools { margin-top: 15px; display: flex; gap: 10px; align-items: center; }
        .color-btn { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #555; cursor: pointer; }
        #clearBtn { margin-left: auto; padding: 8px 15px; background: #ff4757; color: white; border: none; border-radius: 5px; cursor: pointer; }

        /* Chat Area */
        #chat-area { flex: 1; display: flex; flex-direction: column; background-color: #2f303a; }
        #chat-history { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .message { background: #40424f; padding: 8px; border-radius: 5px; font-size: 14px; word-wrap: break-word;}
        .system-message { color: #00d2ff; font-weight: bold; text-align: center; margin: 10px 0; }
        .win-message { color: #2ed573; font-weight: bold; text-align: center; font-size: 16px; margin: 10px 0; }
        
        #chat-input-area { display: flex; padding: 10px; background: #23242b; }
        #guessInput { flex-grow: 1; padding: 10px; border-radius: 5px; border: none; outline: none; background: #111; color: white; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1 style="color: #00d2ff; margin-bottom: 20px;">DRAW & GUESS</h1>
        <input type="text" id="player1Input" placeholder="Player 1 Name" maxlength="12" autofocus>
        <input type="text" id="player2Input" placeholder="Player 2 Name" maxlength="12">
        <button id="startBtn">Start Game</button>
    </div>

    <div id="game-container">
        
        <div id="draw-area">
            <div class="header-info">
                <h3 id="turn-indicator" style="margin: 0; color: #ccc;">Player 1 is drawing...</h3>
                <div class="secret-word-box">
                    <span style="color: #888; font-size: 14px;">Hover to see word: </span>
                    <span id="word-display">APPLE</span>
                </div>
            </div>
            <canvas id="drawingBoard" width="550" height="480"></canvas>
            
            <div class="tools">
                <div class="color-btn" style="background: black;" onclick="changeColor('black')"></div>
                <div class="color-btn" style="background: red;" onclick="changeColor('red')"></div>
                <div class="color-btn" style="background: #00d2ff;" onclick="changeColor('#00d2ff')"></div>
                <div class="color-btn" style="background: #2ed573;" onclick="changeColor('#2ed573')"></div>
                <button id="clearBtn" onclick="clearBoard()">Clear Board</button>
            </div>
        </div>

        <div id="chat-area">
            <div id="chat-history"></div>
            <div id="chat-input-area">
                <input type="text" id="guessInput" placeholder="Type guess here...">
            </div>
        </div>
    </div>

    <script>
        // Game State
        let players = ["Player 1", "Player 2"];
        let drawerIndex = 0; // 0 means players[0] draws, 1 means players[1] draws
        let secretWord = "";
        
        const wordBank = [
            "apple", "elephant", "guitar", "mountain", "robot", 
            "pizza", "ocean", "spaceship", "spider", "castle",
            "penguin", "volcano", "telescope", "dragon", "cactus",
            "bicycle", "hamburger", "tornado", "snowman", "camera"
        ];

        // DOM Elements
        const uiLayer = document.getElementById('ui-layer');
        const gameContainer = document.getElementById('game-container');
        const p1Input = document.getElementById('player1Input');
        const p2Input = document.getElementById('player2Input');
        const startBtn = document.getElementById('startBtn');
        
        const turnIndicator = document.getElementById('turn-indicator');
        const wordDisplay = document.getElementById('word-display');
        const chatHistory = document.getElementById('chat-history');
        const guessInput = document.getElementById('guessInput');

        // Start Game
        startBtn.addEventListener('click', startGame);

        function startGame() {
            const p1 = p1Input.value.trim();
            const p2 = p2Input.value.trim();
            players[0] = p1 === '' ? 'Player 1' : p1;
            players[1] = p2 === '' ? 'Player 2' : p2;
            
            uiLayer.style.display = 'none';
            gameContainer.style.display = 'flex';
            
            startRound();
        }

        function startRound() {
            // Pick a random word
            secretWord = wordBank[Math.floor(Math.random() * wordBank.length)];
            wordDisplay.innerText = secretWord.toUpperCase();

            // Clear the board
            clearBoard();

            // Setup UI for the new turn
            const drawerName = players[drawerIndex];
            const guesserName = players[1 - drawerIndex]; // The other player
            
            turnIndicator.innerText = `✏️ ${drawerName} is drawing!`;
            guessInput.placeholder = `${guesserName}'s guess...`;
            
            addSystemMessage(`--- NEW ROUND ---`);
            addSystemMessage(`${drawerName} is drawing. ${guesserName}, get ready to guess!`);
            
            // Auto-focus the chat box so the guesser is ready to type
            guessInput.focus();
        }

        // --- CHAT & GUESSING LOGIC ---
        guessInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const guessText = guessInput.value.trim();
                if (guessText === '') return;
                
                const guesserName = players[1 - drawerIndex];
                
                // Print the message to chat
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message';
                msgDiv.innerHTML = `<strong>${guesserName}:</strong> ${guessText}`;
                chatHistory.appendChild(msgDiv);
                
                // Check if they won!
                if (guessText.toLowerCase() === secretWord.toLowerCase()) {
                    const winDiv = document.createElement('div');
                    winDiv.className = 'win-message';
                    winDiv.innerText = `🎉 ${guesserName} guessed the word: ${secretWord.toUpperCase()}! 🎉`;
                    chatHistory.appendChild(winDiv);
                    
                    // Swap roles and start a new round after a 3 second delay
                    drawerIndex = 1 - drawerIndex; 
                    setTimeout(() => {
                        startRound();
                    }, 3000);
                }

                chatHistory.scrollTop = chatHistory.scrollHeight; // Scroll to bottom
                guessInput.value = ''; // Clear input
            }
        });

        function addSystemMessage(text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'system-message';
            msgDiv.innerText = text;
            chatHistory.appendChild(msgDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        // --- DRAWING LOGIC ---
        const canvas = document.getElementById('drawingBoard');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineWidth = 5;
        ctx.strokeStyle = 'black';

        function getMousePos(evt) {
            const rect = canvas.getBoundingClientRect();
            return { x: evt.clientX - rect.left, y: evt.clientY - rect.top };
        }

        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            const pos = getMousePos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const pos = getMousePos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        });

        canvas.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mouseout', () => isDrawing = false);

        function changeColor(color) { ctx.strokeStyle = color; }
        function clearBoard() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
    </script>
</body>
</html>
